---
- serviceName: svc-asset-details
  apiConfig:
    method: POST
    path: "/api/v5/assets"
    requireAuth: true
    requireOptionsMethod: true
  serviceConfig:
    environmentalVariables:
      REGION: us-east-1
      TENANT_CONFIG_TABLE: "tenant-config"
      TENANT_CONFIG_PARTITION_KEY: "tenantid"
      ENABLE_EXTENSION: "true"
    lambdaConfig:
      handler: lambda_function.lambda_handler
      runtime: lambda.Runtime.PYTHON_3_12
      runtimeVersion: latest
      timeout: 10
      isArm64: true
      permissions:
        requireS3: false
        requireDynamoDB: true
        requireSecretsManager: false
      layers:
        - name: asset-details-layer
- serviceName: svc-asset-violations
  apiConfig:
    method: POST
    path: "/api/v5/targets/{targetType}/assets/violations"
    requireAuth: true
    requireOptionsMethod: true
  serviceConfig:
    environmentalVariables:
      REGION: us-east-1
      TENANT_CONFIG_TABLE: "tenant-config"
      TENANT_CONFIG_PARTITION_KEY: "tenantid"
      ENABLE_EXTENSION: "true"
    lambdaConfig:
      handler: lambda_function.lambda_handler
      runtime: lambda.Runtime.PYTHON_3_12
      runtimeVersion: latest
      timeout: 10
      isArm64: true
      permissions:
        requireS3: false
        requireDynamoDB: true
        requireSecretsManager: true
      layers:
        - name: asset-vioaltions-layer